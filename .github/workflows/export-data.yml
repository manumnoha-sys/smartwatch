name: Export Health Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # allow manual trigger

jobs:
  export:
    runs-on: self-hosted       # NUC runner — has LAN access to 192.168.1.26:8000
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export health data
        env:
          HEALTH_API_URL: http://192.168.1.26:8000
          HEALTH_API_KEY: ${{ secrets.HEALTH_API_KEY }}
        run: python3 dashboard/export_data.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          keep_files: false
          commit_message: "data: export ${{ github.run_id }}"
