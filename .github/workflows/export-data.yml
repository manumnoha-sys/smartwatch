name: Export Health Data

on:
  schedule:
    - cron: '*/5 * * * *'     # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export health data
        env:
          HEALTH_API_URL: http://localhost:8000
          HEALTH_API_KEY: ${{ secrets.HEALTH_API_KEY }}
        run: python3 dashboard/export_data.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
          commit_message: "data: export ${{ github.run_id }}"
